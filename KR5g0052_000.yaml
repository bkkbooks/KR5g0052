front:
  text: 正一法文太上外籙儀肆六凡男女師皆立治所貴賤拜敬進止依科自往教之輕道明來學之重真其間小師未能立治履歷民間行化自效因緣暫爾不拘大儀若衒法求利不明正典傳非習謬迷誤後生後生緣薄率爾逐易不尋髙德苟貪受名名而無實望福得禍禍加考深宜慎之焉
