body:
  text: 五種女人受要籙第一處女凡處女在家隨父毋教之從師受法父毋為辭稱鄉居男女民生官姓名息女某年歲某月日時生某父母名也荷道重恩得生子息息女某年某歲至心樂道雖是愚蒙庶有豪進今歸師門乞賜成就依法操信奉辭以聞請受某籙修行如法伏願明師特垂允許謹辭疾厄有代皆依前儀凡在家受法臨嫁啓師師不在者同道髙德章書奏聞須至夫某氏别更上聞凡入夫家告夫所受夫啓父毋就師騰言攺姓而巳不須易文在家稱父姓適人稱夫姓第二出家女凡女挺命不願適人啓告父母出家學道或别立靖舍或投師門男師獨立不得受女弟子師若婦即號師毋女弟子來得依師毋無師毋者别憑女師女師出家志業和念從師受籙辭信依科貧無信物師代出之辭稱父鄉居男民生官姓名息女某年歲某月日時生父亡稱毋毋取父姓毋亡稱父殁故男生某息女字某先緣罪重生受女身尫弱愚頑不願出嫁在父毋家無由得學仐誓歸命仰憑師門盡力竭誠灑掃自效畢生續明朝夕香火不敢中悔無有退心依科辦信奉辭以聞唯願明師賜垂成就謹辭後悔有考無悔進法得嫁别有科第三嫁婦凡為人婦事勢多端或不欲嫁尊上逼之或為貴勢俗家迫取或侍奉法或無所奉先所受者悉即還師師即申啓若夫奉道捐改本姓若未有受隨夫受之夫妻同師師脫逺隔得就髙德投辭如科夫鄉居男生姓名妻某歲某月日時生幸藉宿緣得奉大道雖稟女弱得依道民若髙德甲乙之家皆得云道門法門方竭丹誠陪執箕帚仰道延生讃揚妙化剋荷玄祐永充種人謹依法賫信奉辭以聞請受某籙如説修行即云唯願明師特賜垂允謹辭第四寡婦凡寡婦多種有結帶便寡誓不重嫁或有男胤年髙不出或年大無兒富不肯行或貧無人娶或病不能去尚有産業不還本家如此投師辭稱鄉居殁故男生姓名妻某歲某月日時生亹穢既深生受女弱出嫁夫某涉歷某年日月年數隨實言之宿新罪重凶罰奄臻某夫壻以某年月日時捐背疾病某故暴殞喪亡銜哀自咎不敢有怨追恐亡者多愆殃延後人自慮咎積不保推遷雀鼠樂活憑道乞生希附師門濟度身命依法賫信奉辭以聞請受某籙果心如志唯願明師賜副飢渴謹辭第五歸居女凡嫁喪夫或犯七出或年命相剋致使離居不自存立還依本家憂患相纏歸命師門投辭稱父鄉居如處女若夫妻和美大義不絶特以壻亡單寡而歸後命過者還壻合葬如此依前寡婦儀但辭中異同隨宜消息凡出嫁寡婦居三者後皆準婦儀其中辭狀陳前説後吉凶備述不得全用下人四夷受要籙太平經云奴婢順從君主學善能賢免為善人良民良民善人學不止成賢人賢人學不止成聖人聖人學不止成道人道人學不止成仙人仙人學不止成真人真人學不止成大神人大神人學不止成委氣神人此元品人上極入道道教愚下下人得學學依善人受籙如法稱君主鄉居男女民生官姓名私人某賜姓者得言姓年歲某月日時生家生蠻貊狄獠隨實言之叩搏奉辭先緣罪深今生底下甘苦在心不敢有怨蟲草有幸得奉道門聞見善事誠欣誠躍某雖卑頑謬知謹愼夙夜盡勤小心敢懈貪生願活伏事君郎承順大家仰希道祐乞以休息時治灑掃君上賜與之物豪分撰持換易香油給治淨舍今賫法信請受符籙伏願明師賜垂哀遂謹辭四夷云某東西南北四方荒外或某州郡縣山川界內夷狄羌戎姓名今居某處改姓某易名某年歲某月日時生叩搏奉辭先因醜惡生出邊荒不識禮法不知義方亹穢之中善根未絶某年月日時為某事隨某事得來中國聞見道科彌增喜躍含氣願活憑真乞生依法賫信奉辭以聞伏願明師特垂矜副謹辭凡下人受籙之後别立白籍師為緘封三告上言皆得預會觀聽申令有功德者善人放之依良民也受籙後三日謝恩章受籙之後涉前三日假令十日受至十二是三日也詣師再拜三叩搏止又再拜𧵥信起請章章應自書之若未能者假手同法亦自拜奏又未能者師友代之代之者願呪發爐出官操章復爐出呪願悉依别儀受籙者於靖外隨師拜伏師出官稱此籙生名教其叩齒咽氣若朋友奏者隨朋友同就位叩齒拜伏咽氣依朋友朋友示語言之七十五進百五十籙謝恩章具法位臣某誠惶誠恐稽首頓首再拜上言謹案文書某年歲昔以樂化制屬諸君丈人道氣某好道樂神前詣天師某官祭酒姓名受某官七十五將軍籙積有年載某未有微功以報所受猥以今月某日係天師某治氣某考召賫籙賜某官七十五將軍籙并前百五十將軍籙某被蒙大恩喜懼交集玄施洪深誠自勸進謹拜章一通上詣天曹願垂矜省某蒙考召君吏逮召君吏并某先所受某官七十五將軍籙吏兵營護有勤今謁為言功舉遷各加其秩如天曹常科皆依籙謁署便曹隱職無令失意事訖各還宫室如故某晚生後長希遭大化未知逆順宿新愆多今誓攺往修來漸自精勤乞丏前後所犯罪過一切升舉原赦當令某自今以後所向金石為開水火為滅千鬼萬神盡為伏諾所化者化所治者差被蒙大恩以勸未悟恩惟太上分别哀臣愚劣謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置吏驛馬上章吏官各二人出操臣謹為某等拜上某章一通上詣三天某曹伏須告報臣某誠惶誠恐稽首頓首再拜以聞空三行臣某屬某宫焚修空三行年號歲次某某月某朔某日某時章於某處黃籙齋壇拜上空三行可漏用全紙一幅為之太清玄元無上三天無極大道太清金闕七寶玉陛下具章奏法位臣姓某上奏謹封內方函謹謹上詣太上虛無文人宫都司曹治北辰宫具章奏法位姓某謹重封外方函謹謹上詣三天門下請進具章奏法位姓某謹重封童子超受十誡及七十五將軍籙謝恩章上言謹案文書某年某歲月日時生幸藉餘慶世崇大道遇荷玄祐聞見正法竒方異術志願修行齡齒蒙稚未能受習曲奉師愍賜以超擢之榮開晦導昧引入日燭之路今月某日男女師姓名依科考召授某某官某將軍籙洪慈特被祗仰屏營驚欣踊躍謹拜章謝聞伏願太上三天曹上官典者省覽所陳某蒙考召逮召某將軍吏兵真神正氣來某身中同心并力建德立功善業升進剋成種人天官有功謁為舉遷各加其秩如天曹常科比署便曹隱職無令失意受功事訖各還本宫一如故事當令某心明意解動靜合真幽顯歸附以為效信恩惟太上云云成人超受百五十將軍籙言功章上言謹案文書某年某歲月日時生宿有善緣世奉大道若新化云宿罪深重久事六天或違真信俗或無所事未絶善緣得歸正一也好道樂神至誠無巳實希稍進敢願超階不悟先因福厚今師恩深捨濁汚之類班清雲之儔開以拔群之方處以不次之位某月某日男女師姓名依科考召授某百五十將軍籙吏兵光顯天宫威嚴輔正滅邪幽顯敬伏豈某草蟲所可剋當不勝感荷屏營謹拜章謝聞伏願三天曹特降垂省某考召君并所受將軍籙吏兵營護有功今謁為言功舉遷各加其秩如天曹常科比署便曹隱職無令失意事訖各還宫室一如故事某未受籙之前億罪兆過即日乞丐一切赦貫令某自今以後所向金石為開水火為滅千鬼萬神盡為伏諾所化者化所治者差被受大恩以勸未悟恩惟太上云云進籙剌章某州郡縣鄉里男女生姓名年歲被某官召户屬男女主者姓名治男女姓名保舉右牒男女生某前受禁官若干將軍吏兵籙奉法修真堪任進授今求遷署請某官若干將軍吏兵籙如法請給係天師某治氣祭酒臣某稽首再拜謹剌上言如牒男女生某前受某官若干將軍吏兵籙奉法精修堪任進授今求遷署請某官若干將軍吏兵籙謹條行狀州郡縣鄉里姓名年紀所遷請將軍種數所屬天師主者并保舉人姓名如牒謹遣功曹使者考召君吏考核肉人審知情實某應良選及時當下肉人元元須待拜署謁言上官謹以剌言臣某誠惶誠恐稽首再拜詣考召臣姓某四君上言謹案文書男女生姓名年歲前授某官若干將軍吏兵籙今遷署如干將軍籙所請吏兵種數昨入剌如牒須待拜署諸應下者及時所遷某官將軍吏兵營護肉人有功一切還中宫言功舉遷加秩等數如天曹常科比考召君吏所考事立下將軍吏兵付授肉人隨逐覆蓋恩惟太上云云右進籙章剌章出官操復悉依前儀約勑授受亦如初法凡先受後受同一師者後不須米薪唯紙筆等如舊異師各信不可虧凡受更令五年得進一將軍四年十將軍三年七十五將軍二年百五十將軍一年若志行庸愚無長進者悉又倍年三倍無功不知建德直置而巳都不合遷其中聰明才智秀異功德超群不計年限事籙行戒事籙之法恆存其官憶識位次人數少多文武所主有急呼之文常佩身唯欲暫脫若兼參染自可脫之祕籙淨處勿令去失去失有罰依案科儀穿壞攺易淨之如法夫妻同道非為淫穢帶之存之彌不可脫脫之為淫更增重考若入餘處凶喪之間危險鬼賊恆佩勿脫神入體中不存素上籙符在身存師在心帶之不捨以堅忠信若有喪産及行出觸穢皆即解除依太上祕教凡為道民便受護身符及三戒進五戒八戒然後受籙受籙之前未受者受籙之後依次受之誦習通利恆存思行諸識不謬忘則犯科未受籙時無所呼召受籙之後動靜呼神不行戒者呼之不至破戒之人吏兵逺身還上天曹考官便逮致諸厄疾公私災橫轗軻衰否所作不成成功立德捨暗入明施善禳惡以吉除凶要在行戒神即祐之戒有别文精詳修習或有不解或有遺忘或有謬誤或冒禁故為或尊上逼迫或畏死犯之皆是愆招悉名破戒即應懴悔首謝自新大略如後消息施行凡違戒者背負鞫言協道信邪雜事信俗此為不專中心懷二愚迷猶豫惑障纏深師三誨之必能攺革守一不惑召神有效三誨不悛是為叛道乖逆師尊法應奪籙違真奉俗及無所事師慈愍之不追處責怨對事他棄本逐末雖名奉道實犯正科師移諸官不得容受積久知悔更立殊功乞還聽許依德升遷若瞋恚委遁不輸籙符師勿苦求但移而巳又外犯陽官死罪從刑即是負道皆應奪籙鞭笞贖罰章奏解之刑而枉者啓告勿奪又內犯隂官師友諌喻苟作不從皆宜格奪輕重詳量師朋評議令法取允幽顯貴知破戒謬濫師資格同罪奪之後首悔立功隨宜進署依科遵行去失籙者輸罰更受凡失更令罰薪五束朱三兩飯賢三人皆中廚也失一將軍薪半車朱四兩飯賢五人失十將軍薪一車朱五兩飯賢十人失七十五將軍薪二車朱七兩飯賢五十人失百五十將軍薪三車朱九兩飯賢百人失三官至百五十將軍皆輸罰畢得受更令隨功進若有殊功異德超復由師凡輸罰後操辭送信皆如初立功求進凡能志學皆應從師如戒修行立功建德德者五德也功者九功也一曰仁好生惡殺二曰禮敬愼和柔三曰信忠直不妄四曰義明斷無邪五曰智清正通達一曰理元氣願念無形二曰理上天志存大神三曰理下地守靜思真四曰理四時隨順仙化五曰理五行宣揚大道六曰理隂陽係續聖種七曰理文書讃弘道法八曰理草榖攝延凡命九曰理財貨利下通上此九與五具在經中諳識文字咨受口訣依案施行堅固精進誓無退轉是為立功功被於外德充於內內外雖殊功德合也有德立功聽求進業辭隨時宜大略如左某州郡縣鄉里男女生姓名年歲叩摶乞恩辭幸藉善緣崇奉大法某年月日時蒙師若先以他師云蒙男女師某州郡縣鄉里姓名賜授某官籙奉法以來積如干年月依案旨訣遵行鞫言伏從戒律不敢違負愚短未達犯或不知才力未深修行未究思此慙忸實忘寢食自揆庸品簡悟未弘某年某月日起習某事從來至今粗有效驗功微業淺不敢間寧仰希寸進以奬愚蔽謹賫科信冒辭以聞伏願明師賜垂成就塵黷玄鑒追紙驚惶謹辭太歲某某月日奉辭五德九功各有經法法有內外學者兼行仁禮信義智及諸理內祕在心外現在迹迹及心術更互受名金木火水土榖謂為六府正德利用厚生謂為三事三事六府又號九功道德仁義禮文武辨法此即九經九經之中備有功德功德之名為善總稱總稱之中三術為要隱形藏名遺榮是也內以心知外以迹辨辨迹有事事即為業業在有為心存無為為簡為素棄捐繁華期至無為也簡素之迹始於身口終以檢心起修五德九功五德一者長齋乾蔬不食肥鮮放生救死平等一心二者供養三寶禮拜盡節承奉和順不生怠慢三者言語真實無有虛詐方便依法不捐物益已四者辨是明非咨師問友布施平正斷決邪疑五者智慧精審所説依經經通無礙動靜會道不自作一法違負幽明九功一者勸諸同志念身無為思身洞白委氣無形二者守形虛白若玉無瑕三者積精內視數髮至足四者思五藏神見與言語五者念召體神使四時五行六者醮六甲八吏符剌地神七者役使社稷山川衆神八者習延精氣占説是非九者呼鬼問以吉凶右五德九功隨人所能能行之者總名為功功者工也工者能也能救世者助國扶命益物濟身幽顯有賞自六功至九其事多邪不精持戒必陷魔群道之下品有此三階法甚危險愼之乃佳佳者求進辭略言之選賢薦德師量弟子計功補過小愆可恕大德宜嘉凡立功德五九相和九經三術各有所長修此業者又有洪纎小弱卑微擬門驅使負薪汲水隨力效勤中人侍衛拂拭左右灑掃庭內端正香燈摩研點筆傳譯語言大者富貴勢力讃揚聖化化惡為善導歸師門必此功勤感動幽顯未敢求進師當薦之遷籙不依年限隨次或超受兼自案前儀消息剌語若必賢能堪執刀筆薦為書吏其文如左某州群縣鄉里男女生姓名年歲字某某月日生右一人某年月日時從臣或師男女官祭酒道士姓名受某官籙在治效勤涉如干年月太玄都正一平氣係天師某治氣祭酒臣某叩頭死罪再拜上言謹案文書前狀某奉法精修弘道進德立功勤欵宜蒙顯署已被仙官吏兵以自防衛某不以微賤貪生樂活願慕清化習學方術書畫並精才識朗達求為書吏助時理氣某自誓三年洗心試效臣案師法領戶十以上署書吏一人五十戶以上署二人三百戶以上署四人五百戶以上署八人千戶以上署十二人二千戶以上依此為率臣某今領戶如干依科應署書吏如干人識真者稀堪事者少今搜索忠賢隨能署置前舉某鄉里男女生姓名補任所闕未充或未有所舉於事是須今請以某為一時有好道欲樂補者來復續上願太上諸君丈人天師君以道氣覆蓋臣某及某身令在事日覺聰明心開意悟不使凡俗所見仙訣臣某當與某併心盡力為太上驅馳不致逋懈省某情行自誓年滿堪為民主當别騰言署為祭酒拜授之日自更剌章肉人元元誠可哀愍願道氣歸流赦降愆咎臣某不勝受恩謹拜章上聞願天曹典者科省聽許恩惟太上云云右署書吏章書吏對奏奏竟九拜而已前禮請謝師如常書吏拜後三月言功準籙生儀褒賞謙讓書吏籙生慧解易悟骨氣合真自然有分先習散氣散氣者童男童女咨問生氣不死之方粗知終始便進散化散化一將軍籙稱散氣童男童女祭酒十將軍籙稱散官保氣祭酒七十五籙稱散官持氣祭酒百五十籙稱晞氣祭酒皆行符勑水教訓萬民章表奏聞濟生救死化得三人為一功三功為一勤三勤為一勳勳者有德仍得署治內外星宿隨次受之有勳德者師友褒賞其文如左國號如干年太歲某某月朔日子係天師某治氣祭酒姓名叩頭死罪敢言之天師門下伏聞大道應感化導善人先亦妙法秉法須才才者執法幹事功成恩濟蒼生澤潤幽顯竊見某州郡縣鄉里男女生姓名年歲字某稟性淵深少明經術持戒精嚴處事平允剛而能柔通而能斷風氣髙朗人鬼所憚實宣化之良才救時之俊士毀至不戚譽來不欣幽既獨善顯必兼通宜進真化以奬後賢且其在任已經年所書局應遷親臨正化仰惟明師善於信受冒獻丹誠言不人廢所貢翹勤伏待嘉旨某叩頭叩頭死罪死罪師教所舉唯賢實允時務即命門下頃刻施行此教出後謙讓如左某籙男女生姓名惶恐言伏見男女生官姓名褒文謬舉聖旨曲章祗奉驚慙心形飛越某幸遭妙化恩溢生涯方思竭誠專修所忝懼於負殿實敢希遷教許守分法開濟時謹冒披丹理乖飾讓伏願尊慈特回成命賜遂愚欵息叨非據免忘寵之咎全保寡之真蒙斯載躍不敢塵嚴某誠惶誠恐叩頭叩頭死罪死罪太歲某某月日師教敷化須賢待才甚渴衆議勿違宜寢謙讓師之所命友之所推勞不敢憚逸不敢欣茍有不堪志有所慕具得自陳辭一至三得不多過度散化章某州郡縣鄉里男女姓名年歲若童男女父母啓師師為奏之若夫妻應同受師不得偏坐狀某稟性質直志合忠朴心好長生行應端慤清虛真實宜稟中真依科漸升請受散氣某年月日男女生官姓名右五人保舉上言謹案文書臣以頑昧宣化無方雖思精誠補益師老而愆多功薄恆懼危墜大慈含弘賜全首領誓立微勤仰酬皇極依法搜賢宣和正氣右牒男女生官姓名生長流浪之俗而能潔已守真願樂清玄屬素通詣進問師法延生之方元元之情著於丹赤求乞之勤感於影像臣以玄中至妙道法所重愚俗守迷修奉者少某今專信情在不移伏想皇極當所思聞輒具告真言隂陽之施夫妻二儀種民之要三五七九更相過度同出三界逍遙三清謹為請隂陽生氣度道君吏九氣丈人逮召君吏消災散禍解厄君將吏天地水三官考召君將吏等一合下入某身中經營內外辟除患害安魂定魄斷滅三蟲養育玄根又遣臣所佩左右官使者隂陽神決吏二人上詣泰清仙都玉曆著某生籙削某死籍當令某長生久視永為種民某以單衣一要為信乞未奉道之前千罪萬過令悉赦貫恩惟太上如常中言操臣為男女生姓名拜上請官度散化章也度散化章用中法出官儀在别卷中凡受散化具得治寫二十四卷習讀存思預中章驅使未備真氣不得為師有愆悔謝凡有愆罪招奪符籙或去失皆投辭悔謝大體如左某州郡縣鄉里男女姓名年歲匍匐頓顙謝罪乞恩辭某以草苗謬遭大化乞垂慈育賜以生津某年月日蒙署某籙施行越科致招考謫某年月日時某事觸忤公私犯負三尊師命門人招奪所佩某籙或某年月日時於某處某事去失所佩某籙從實言之責躬自咎殺身無補雀鼠願活冒乞更造之恩誓浣心腹希重蘇之澤攺往修來不敢以前為比伏願玄慈特垂一開大宥賜使朽骨更肉奬勗巳枯還荑謹冒依科輸罰如法曲蒙愍恕萬沒猶生仰塵清嚴伏增汗悚謹辭太歲某某月日時奉辭師受辭後詳量輕重依科奏聞隨宜授署三失三愆不得重受殊功異德二十五年乃得受耳凡殊功異德不可勝言譽其大較觸類準用其才智濟世文武匡時建立治舍宣揚玄風化惡還善執正除邪傾國倒家供養三寶逺略權謀誅鬼滅賊平定四方安寧社稷救死濟生興隆道教盡力竭財積無退悔能如斯者是殊功異德也受謫後無功凡有過即謝不得逾時寅時有過不得過卯若事趣逾時不得間日三日不謝罰又倍之九日不謝謝不得原原在九日之內原後三日便應立功九日之內不能立功或愚頑卑猥不知自效或衰老貧病財力不充或童蒙未悟父毋又凡不能代兒立續輸勤遂乃歷年直置勿署久久之後忽有殊功隨德次進明師量也受謫後有功凡受謫之後三日九日或悔謝有期期限畢訖輸罰如科依例得署不問小大皆從更令始有殊功者趣集隨宜凡有罪奪籙後原更受同去失之科輸罰飯賢不得致闕師取其先籙依法淨之去失格奪首謝日周師為奏考章失籙首謝乞恩遷考章未受治不得自遷考巳受出官得自奏章也上言謹案文書某州郡縣鄉里男女生姓名年歲某月日時生叩摶首罪乞恩辭素下官子孫千載運會得𨽻道門奉屬太上諸君丈人道法垂護以自保持蒙恩端正誠自勸進某昔以某年月日時詣師或天師某官姓名謝受某官將軍籙吏兵營衛積年安隱某施行多違罪過山疊招延考罰非意去失某年月日時於家或在某處遭公私逼迫水火盜賊依實言之不知所佩籙何在尋檢不得或恐燒沒凶人將去隨事言之依法自謫輸薪如千車設廚如千人以贖除罪過得受更令臣妾不勝見肉人元元謹為拜章以聞願上官典者分别省理乞丐原赦某身千罪萬過宿新愆障一切蕩除依案科制輸失伏罪首過乞恩得署九宫别當刺請今先陳言勑某自誓攺往修來原罪除咎功行日新與之更始保其愼終所失將軍吏兵致有考召謁還天曹各安宫府無有恚恨恩惟太上云云有治者失籙自遷考章上言謹案文書某以凡微千載之會得在道化效勤無績愆闕屢修彰上師家以自保持蒙賜如干將軍籙內以治身外以治病得有今日誠自歡慰豈是肉人所能負荷而奉修不謹無狀多違招延考謫忽以某月日零失所佩推尋追求不知所在某思過自責爰從受籙以來實無功賞奬助之勤吏兵坐某致有罪負繫在三官至今削奪零失所佩伏自剋責追謝前愆歸命大道乞一切之恩謹冒罪拜章謝聞上官典者通行文曹赦千罪萬過某雖憑請髙在化日淺不知逆順今剋心蕩腸改惡修善乞原往日之釁更録將來之誠所求籙上將軍吏兵遷還本職今依科輸謫布德道門恩惟太上裁垂省察分别求哀此失籙解考謝罪章事訖輸解更罰自攺也輸罰未備遷考章上言謹案文書某州郡縣鄉里男女生姓名年歲妻息年歲叩頭自搏首罪乞恩辭列素肉人頑愚無知貪生樂活以某年月日詣某官祭酒姓名受某籙吏兵以自保持從來受恩身體強健肉人奉法懈怠防險不固以某年月日行於某處忽然失去符籙思過責躬纍自首謝從道求哀比加賞慕四出尋博遂失所在有罪云頑愚觸壁致招深尤某年月日時為某事犯違師法所佩某籙被奪悔謝剋躬誓自攺勵叩頭向臣求乞平省伏案師法去失有罰罰後更署立功依科某失如干將軍籙罰薪如干車飯賢如干人制罰責者以肅其違值今災厄私門困苦敢緣大道慈仁含弘每愍凡愚法有申延某失某籙即應被罰但某童蒙加且女弱或又老年不任樵伐未辦飯賢誓志為計展其立功求乞哀恕臣輒愚情量儀準法使行送罰薪如干車飯賢如干人以為微漸懼不上合伏用悚息如蒙矜允所送薪及飯賢如干人共值如干又詣治請受更令九官籙謹為上聞尋願白剌其飯賢如千人别剋良日於治施設所餘薪及飯賢未具須賫詣治解了解了之後進受仙靈二官某自申明太上天師洪澤大恩臣草苗小子不明大度謹冒湯火拜章上聞願上官典者特垂矜省原某愆失千罪萬過若有考召君吏為言功舉遷加官益秩無令患恨恩惟太上云云送罰遷考後受九官剌某州郡縣鄉里男女姓名年歲字某户屬男女主者姓名治男女生姓名保舉右牒男女生某某年月日時從臣或男女官祭酒姓名天師如干世男子孫張某受如干將軍籙奉法違科致招考罰某年月日時於某處為某事或無故不覺去失水火盜賊逼奪隨事言之尋覓積日盡心竭力遂不能得未測所在甘罪吞音不敢怨訴但蟲蟻願活草苗貪生恐值年世百毒流行罪穢肉身無所佩帶深懼遭罪命若晷刻仰緣大道慈父聖毋含弘曲濟開許自新某今改往修來依科輸罰洗心欵到遷考乞恩請署更令九官吏兵如法請給係天師某治氣祭酒臣某稽首再拜謹剌上言如牒男女生某前受某官籙罪考去失今輸罰乞署謹條州郡縣鄉里姓名年紀所屬主者保舉人名謹遣功曹使者考召君等署正肉人審知誠狀某應蒙原恕宜署九官及時當下肉人元元須待拜署謁言上宫謹以剌言臣某誠惶誠恐稽首再拜詣如前送署遷考後受九官章上言謹案文書某州郡縣鄉里男女生姓名年歲某年月日時生今住某處即日叩頭自搏首罪乞恩辭某實凡微蟲草之末謬藉先善叨厠人流良緣增長聞見正真前以慕化制屬大法好道樂神願得久視某年月日時詣天師某官祭酒姓名受仙靈若干將軍籙積若干年無功罪積為考所逮某年月日失所佩籙無狀所招比過自責推求不得某從來實不自關啓諸有負坐跪君跪吏閉繫三官願為原赦刑罪功賞時達還官復職各如故事某以晚生遭化日淺未解逆順今當自責出若干某物以自拔贖備録科格某改往修來乞丐原赦前後刑謫與之更始特蒙矜愍即日署更令九官昨向某時入剌如牒須待報應拜授諸應下者及時營護肉人有功遷序依天曹科比所考事立九官吏兵隨逐覆祐滅罪興福道德日升功業成就恩惟太上云云輸罰受籙後三日謝恩言功章上言謹案文書某以無狀罪過委積以某月日時忘失所佩如干將軍籙思愆自責推求不得從實關啓被蒙恩覆男女師姓名某月日更賜拜署非肉人所可重招不勝喜悅拜章以聞先跪君跪吏閉繫在三官者乞一切之恩願為赦貸刑罪還官復職各如故事某遭化日淺未知逆順今誓改往修來不敢以先為比違負之愆特丐更始願從今以去金石為開水火為滅所治者差所化者化以明師道有信之效輒當勸示愚民不敢懈怠恩惟太上云云正一法文太上外籙儀
